# Standalone IP repo: .github at repository root. Monorepo: /.github/workflows/verify-all.yaml.
name: CF_SPI Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sim: [icarus, verilator]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Verilator
        if: matrix.sim == 'verilator'
        id: cache-verilator
        uses: actions/cache@v4
        with:
          path: /opt/verilator
          key: verilator-v5.030-${{ runner.os }}

      - name: Install simulators
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog lcov
          if [ "${{ matrix.sim }}" = "verilator" ]; then
            if [ "${{ steps.cache-verilator.outputs.cache-hit }}" != "true" ]; then
              sudo apt-get install -y autoconf flex bison libfl-dev help2man
              cd /tmp
              curl -sL https://github.com/verilator/verilator/archive/refs/tags/v5.030.tar.gz | tar xz
              cd verilator-5.030
              autoconf && ./configure --prefix=/opt/verilator && make -j$(nproc) && sudo make install
            fi
            echo "/opt/verilator/bin" >> $GITHUB_PATH
            echo "VERILATOR_ROOT=/opt/verilator/share/verilator" >> $GITHUB_ENV
          fi

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cf-ipm
          pip install -r verify/pyuvm/requirements.txt

      - name: Install IP dependencies
        run: ipm install-dep

      - name: Run tests (${{ matrix.sim }})
        working-directory: verify/pyuvm
        run: python test_runner.py
        env:
          SIM: ${{ matrix.sim }}

      - name: Write job summary
        if: always()
        working-directory: verify/pyuvm
        run: |
          RESULTS="sim/${{ matrix.sim }}/merged/RESULTS.md"
          echo "## CF_SPI Verification — ${{ matrix.sim }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "$RESULTS" ]; then
            cat "$RESULTS" >> $GITHUB_STEP_SUMMARY
          else
            echo "> Tests did not produce a report." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.sim }}
          path: verify/pyuvm/sim/

  update-badge:
    if: github.ref == 'refs/heads/main' && !failure() && !cancelled()
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: results-verilator
          path: sim-results

      - name: Extract coverage metrics
        run: |
          DIR="sim-results/verilator/merged"

          FUNC_COV="0"
          if [ -f "$DIR/coverage_report.json" ]; then
            FUNC_COV=$(python3 -c "
          import json
          d = json.load(open('$DIR/coverage_report.json'))
          print(round(d.get('overall_pct', 0), 1))
          ")
          fi

          TESTS_INFO="0/0"
          if [ -f "$DIR/results.json" ]; then
            TESTS_INFO=$(python3 -c "
          import json
          r = json.load(open('$DIR/results.json'))
          p = sum(1 for t in r if t['passed'])
          print(f'{p}/{len(r)}')
          ")
          fi

          RTL_LINE="N/A"; RTL_BRANCH="N/A"
          if [ -f "$DIR/merged.info" ]; then
            eval $(python3 -c "
          dt=dh=brf=brh=0
          for l in open('$DIR/merged.info'):
            l=l.strip()
            if l.startswith('DA:'):
              dt+=1
              if int(l[3:].split(',')[1])>0: dh+=1
            elif l.startswith('BRF:'): brf+=int(l[4:])
            elif l.startswith('BRH:'): brh+=int(l[4:])
          lp=round(dh/dt*100,1) if dt else 0
          bp=round(brh/brf*100,1) if brf else 0
          print(f'RTL_LINE={lp}')
          print(f'RTL_BRANCH={bp}')
          ")
          fi

          echo "FUNC_COV=$FUNC_COV" >> $GITHUB_ENV
          echo "TESTS_INFO=$TESTS_INFO" >> $GITHUB_ENV
          echo "RTL_LINE=$RTL_LINE" >> $GITHUB_ENV
          echo "RTL_BRANCH=$RTL_BRANCH" >> $GITHUB_ENV

      - name: Generate badge JSON files
        run: |
          mkdir -p .github/badges
          python3 -c "
          import json, os
          badges = {
            'verification': {'label':'tests','message':'${{ env.TESTS_INFO }} passed','color':'brightgreen'},
            'func-coverage': {'label':'functional coverage','message':'${{ env.FUNC_COV }}%','color':'brightgreen'},
            'line-coverage': {'label':'line coverage','message':'${{ env.RTL_LINE }}%','color':'brightgreen'},
            'branch-coverage': {'label':'branch coverage','message':'${{ env.RTL_BRANCH }}%','color':'yellow'},
          }
          for name, b in badges.items():
            b['schemaVersion'] = 1
            with open(f'.github/badges/{name}.json','w') as f:
              json.dump(b, f, indent=2)
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .github/badges
          destination_dir: badges
          keep_files: true

  comment-pr:
    if: github.event_name == 'pull_request'
    needs: [verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: results-verilator
          path: results

      - name: Post results to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const mdPath = 'results/verilator/merged/RESULTS.md';
            if (fs.existsSync(mdPath)) {
              const body = fs.readFileSync(mdPath, 'utf8');
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
